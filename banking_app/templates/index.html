<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Banking Transaction Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h2>Secure Banking Transaction Portal</h2>
            </div>
            <div class="card-body">
                <h5 class="card-title">Step 1: Select Your Bank</h5>
                <div class="mb-3">
                    <label for="bankSelect" class="form-label">Bank Name</label>
                    <select class="form-select" id="bankSelect">
                        <option selected disabled value="">Choose...</option>
                        <option value="Canara Bank">Canara Bank</option>
                        <option value="SBI">State Bank of India (SBI)</option>
                        <option value="Indian Bank">Indian Bank</option>
                        <option value="Kotak Mahindra">Kotak Mahindra Bank</option>
                    </select>
                </div>
                <div class="text-center">
                    <img id="bankLogo" src="" alt="Bank Logo" class="img-fluid" style="max-height: 100px; display: none;">
                </div>
                <button id="nextBtn" class="btn btn-primary w-100 mt-3" disabled>Next</button>
            </div>
        </div>
    </div>

    <!-- Gemini Chatbot Widget -->
    <div id="chatbot-widget">
        <div id="chatbot-header">
            <span>AI Assistant</span>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-body">
            <div id="chatbot-messages"></div>
            <div id="chatbot-input">
                <input type="text" id="user-message" placeholder="Ask a question...">
                <button id="send-message">Send</button>
            </div>
        </div>
    </div>
    <button id="open-chatbot">Chat</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
