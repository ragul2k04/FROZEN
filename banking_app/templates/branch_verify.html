<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 5: Branch Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h2>Branch Staff Verification</h2>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="tokenInput" class="form-label">Customer Transaction Token</label>
                    <input type="text" class="form-control" id="tokenInput">
                </div>
                <button id="generateOtpBtn" class="btn btn-secondary w-100 mb-3">Generate OTP</button>

                <div id="otp-section" style="display: none;">
                    <div class="mb-3">
                        <label for="otpInput" class="form-label">Enter 6-Digit OTP</label>
                        <input type="text" class="form-control" id="otpInput" maxlength="6">
                    </div>
                    <button id="scanFingerprintBtn" class="btn btn-info w-100 mb-3">Scan Fingerprint (Simulated)</button>
                </div>

                <div id="final-verify-section" style="display: none;">
                    <button id="verifyCompleteBtn" class="btn btn-primary w-100">Verify & Complete Transaction</button>
                </div>

                <div id="verification-result" class="alert mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Gemini Chatbot Widget -->
    <div id="chatbot-widget">
        <div id="chatbot-header">
            <span>AI Assistant</span>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-body">
            <div id="chatbot-messages"></div>
            <div id="chatbot-input">
                <input type="text" id="user-message" placeholder="Ask a question...">
                <button id="send-message">Send</button>
            </div>
        </div>
    </div>
    <button id="open-chatbot">Chat</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
