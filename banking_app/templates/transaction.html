<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3: Transaction Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h2>Transaction Details</h2>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Transaction Type</label>
                    <div class="d-grid gap-2">
                        <input type="radio" class="btn-check" name="transactionType" id="deposit" value="Deposit" autocomplete="off">
                        <label class="btn btn-outline-primary" for="deposit">Deposit</label>

                        <input type="radio" class="btn-check" name="transactionType" id="withdrawal" value="Withdrawal" autocomplete="off">
                        <label class="btn btn-outline-primary" for="withdrawal">Withdrawal</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label">Amount (₹)</label>
                    <input type="number" class="form-control" id="amount" placeholder="Enter amount">
                    <div class="invalid-feedback"></div>
                </div>
                <button id="submitTransaction" class="btn btn-primary w-100">Submit & Generate E-Form</button>
            </div>
        </div>
    </div>

    <!-- Gemini Chatbot Widget -->
    <div id="chatbot-widget">
        <div id="chatbot-header">
            <span>AI Assistant</span>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-body">
            <div id="chatbot-messages"></div>
            <div id="chatbot-input">
                <input type="text" id="user-message" placeholder="Ask a question...">
                <button id="send-message">Send</button>
            </div>
        </div>
    </div>
    <button id="open-chatbot">Chat</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
