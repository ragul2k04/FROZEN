<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 4: E-Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h2>Electronic Transaction Form</h2>
            </div>
            <div class="card-body">
                <div id="eform-details">
                    <p><strong>Bank:</strong> <span id="eform-bank"></span></p>
                    <p><strong>Account Number:</strong> <span id="eform-account"></span></p>
                    <p><strong>Customer Name:</strong> <span id="eform-name"></span></p>
                    <p><strong>Mobile Number:</strong> <span id="eform-mobile"></span></p>
                    <p><strong>Transaction Type:</strong> <span id="eform-type"></span></p>
                    <p><strong>Amount:</strong> ₹<span id="eform-amount"></span></p>
                </div>
                <hr>
                <div class="text-center">
                    <h5>Transaction Token</h5>
                    <p class="fs-4 text-monospace bg-light p-2 rounded" id="eform-token"></p>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-secondary" onclick="window.print()">Print / Save Form</button>
                    <button id="proceedToBranch" class="btn btn-primary">Proceed to Branch Verification</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Gemini Chatbot Widget -->
    <div id="chatbot-widget">
        <div id="chatbot-header">
            <span>AI Assistant</span>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-body">
            <div id="chatbot-messages"></div>
            <div id="chatbot-input">
                <input type="text" id="user-message" placeholder="Ask a question...">
                <button id="send-message">Send</button>
            </div>
        </div>
    </div>
    <button id="open-chatbot">Chat</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
